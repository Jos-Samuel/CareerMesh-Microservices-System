# DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: company
  labels:
    app: company
spec:
  replicas: 1
  template:
    metadata:
      name: company
      labels:
        app: company
    spec:
      containers:
      - name: company
        image: docker.io/josamuel7/companyms:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: k8s
        - name: SPRING_DATA_REDIS_HOST
          value: redis
        - name: SPRING_JPA_HIBERNATE_DDL_AUTO
          value: update
      restartPolicy: Always
  selector:
    matchLabels:
      app: company