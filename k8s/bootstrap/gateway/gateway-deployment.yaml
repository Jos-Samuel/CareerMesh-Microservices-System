apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: docker.io/josamuel7/gateway-ms:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8084
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8084
          initialDelaySeconds: 30
          periodSeconds: 10
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: k8s
        - name: SPRING_DATA_REDIS_HOST
          value: redis
        - name: JAVA_TOOL_OPTIONS
          value: "-Djava.security.egd=file:/dev/./urandom"
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  selector:
    app: gateway
  ports:
  - port: 8084
    targetPort: 8084
  type: LoadBalancer
